<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashi Gupta | Terminal</title>
    <meta name="description" content="CLI based terminal portfolio of Yashi Gupta, DevOps Engineer and SDE.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/cli/style.css">
    <link rel="icon" href="./assets/images/avatar-3.png" type="image/x-icon" />
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    
    <div class="gui-toggle">
        <a href="gui.html" class="gui-btn">
            <span class="btn-icon">✨</span>
            <span class="btn-text">Switch to GUI</span>
        </a>
    </div>

    <main class="terminal-container">
        <div class="terminal-header">
            <div class="header-buttons">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="header-title">yashigupta@portfolio: ~</div>
        </div>
        <div id="terminal-body" class="terminal-body" onclick="document.getElementById('command-input').focus();">
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">yashigupta@portfolio:~$</span>
                <input type="text" id="command-input" spellcheck="false" autocomplete="off" autofocus>
            </div>
        </div>
    </main>

    <script src="assets/cli/particles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initParticles({
                color: 'rgba(0, 255, 65, ',
                shadowColor: 'rgba(0, 255, 65, 0.5)',
                minSize: 5,
                maxSize: 10,
                count: 40
            });
        });
    </script>
    <script src="assets/cli/script.js"></script>
</body>
</html>
